# IPD研发管理平台 - Docker 部署配置
version: '3.8'

services:
  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: ipd-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - ipd-network
    restart: unless-stopped

  # 后端服务
  backend:
    build:
      context: ../src/backend
      dockerfile: Dockerfile
    container_name: ipd-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ipd_platform
      - DB_USER=ipd_user
      - DB_PASSWORD=ipd_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ipd-network
    restart: unless-stopped

  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: ipd-postgres
    environment:
      - POSTGRES_DB=ipd_platform
      - POSTGRES_USER=ipd_user
      - POSTGRES_PASSWORD=ipd_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ipd-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipd_user -d ipd_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ipd-redis
    command: redis-server --appendonly yes --requirepass redis_password
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - ipd-network
    restart: unless-stopped

  # MinIO 对象存储（可选）
  minio:
    image: minio/minio:latest
    container_name: ipd-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ipd-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  ipd-network:
    driver: bridge
