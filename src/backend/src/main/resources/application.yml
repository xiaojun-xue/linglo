# 玲珑 Linglo 研发管理平台 - 应用配置
spring:
  application:
    name: linglo-platform

  # 开发环境使用 H2，生产使用 PostgreSQL
  profiles:
    active: dev

  # JPA 配置
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true

# JWT 配置
jwt:
  secret: IPDPlatformSecretKey2026MustBeAtLeast256BitsLong!
  expiration: 86400000  # 24小时
  refresh-expiration: 604800000  # 7天

# Swagger 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# 日志配置
logging:
  level:
    com.ipd.platform: DEBUG
    org.springframework.security: DEBUG
