# 开发环境配置 - 使用 H2 内存数据库
spring:
  datasource:
    url: jdbc:h2:mem:ipd_platform;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 控制台（方便调试）
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA 使用 H2
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop  # 开发环境每次启动重建数据库

  # Redis（开发环境可选）
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

# JWT 配置
jwt:
  secret: IPDPlatformSecretKey2026MustBeAtLeast256BitsLong!
  expiration: 86400000
  refresh-expiration: 604800000

# 日志级别
logging:
  level:
    com.ipd.platform: DEBUG
    org.springframework.security: DEBUG
